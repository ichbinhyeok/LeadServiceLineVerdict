name: Manual OCI deploy for Lead Line Record

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/leadline:latest
            shinhyeok22/leadline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare OCI deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            mkdir -p ~/deploy/leadline/logs
            cat <<EOF > ~/deploy/leadline/.env
            IMAGE_TAG=${{ github.sha }}
            EOF

      - name: Copy compose file to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: "docker-compose.yml"
          target: "~/deploy/leadline"
          overwrite: true

      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            cd ~/deploy/leadline
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Verify OCI container and image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            cd ~/deploy/leadline
            docker compose ps
            docker image inspect shinhyeok22/leadline:${{ github.sha }} --format '{{json .RepoDigests}}'
            test "$(docker inspect leadline --format '{{.Config.Image}}')" = "shinhyeok22/leadline:${{ github.sha }}"

      - name: Verify OCI local homepage on port 8094
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            HOME_HTML=$(curl -sSf http://127.0.0.1:8094/)
            echo "$HOME_HTML" | grep -o "<title>[^<]*</title>" | head -n 1
            echo "$HOME_HTML" | grep -q "Lead Line Record"

      - name: Verify OCI local lookup route
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            LOOKUP_STATUS=$(curl -s -o /tmp/leadline-lookup.html -w "%{http_code}" http://127.0.0.1:8094/lookup)
            echo "lookup_status=$LOOKUP_STATUS"
            test "$LOOKUP_STATUS" = "200"

      - name: Verify OCI local utility route
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -e
            UTILITY_STATUS=$(curl -s -o /tmp/leadline-utility.html -w "%{http_code}" http://127.0.0.1:8094/lead-service-line/dc/washington/dc-water)
            echo "utility_status=$UTILITY_STATUS"
            test "$UTILITY_STATUS" = "200"

      - name: Verify public domain
        run: |
          set -e
          HOME_HTML=$(curl -sSf https://leadlinerecord.com/)
          echo "$HOME_HTML" | grep -o "<title>[^<]*</title>" | head -n 1
          echo "$HOME_HTML" | grep -q "Lead Line Record"
          LOOKUP_STATUS=$(curl -s -o /tmp/public-lookup.html -w "%{http_code}" https://leadlinerecord.com/lookup)
          echo "public_lookup_status=$LOOKUP_STATUS"
          test "$LOOKUP_STATUS" = "200"
          UTILITY_STATUS=$(curl -s -o /tmp/public-utility.html -w "%{http_code}" https://leadlinerecord.com/lead-service-line/dc/washington/dc-water)
          echo "public_utility_status=$UTILITY_STATUS"
          test "$UTILITY_STATUS" = "200"
