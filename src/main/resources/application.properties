spring.application.name=lead-line-record
gg.jte.developmentMode=false
gg.jte.usePrecompiledTemplates=true
gg.jte.templateLocation=src/main/jte
lead-service-line.data-root=data
lead-service-line.site-base-url=https://leadlinerecord.com
lead-service-line.ops-review-enabled=false
lead-service-line.ops-review-token=
lead-service-line.admin-enabled=true
lead-service-line.admin-username=${LEAD_LINE_ADMIN_USERNAME:admin}
lead-service-line.admin-password=${LEAD_LINE_ADMIN_PASSWORD:tlsgur3108}
lead-service-line.census-geocoder-enabled=true
lead-service-line.census-geocoder-base-url=https://geocoding.geo.census.gov
lead-service-line.census-geocoder-benchmark=Public_AR_Current
lead-service-line.census-geocoder-vintage=Current_Current
lead-service-line.lookup-log-enabled=false
lead-service-line.lookup-log-path=data/logs/lookup-events.jsonl
lead-service-line.lookup-log-retention-days=14
lead-service-line.recommendation-log-enabled=true
lead-service-line.recommendation-log-path=data/logs/recommendation-clicks.jsonl
lead-service-line.recommendation-impression-log-path=data/logs/recommendation-impressions.jsonl
lead-service-line.recommendation-log-retention-days=30
