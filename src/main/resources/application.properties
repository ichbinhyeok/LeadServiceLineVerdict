spring.application.name=lead-line-record
gg.jte.developmentMode=false
gg.jte.usePrecompiledTemplates=true
gg.jte.templateLocation=src/main/jte
lead-service-line.data-root=data
lead-service-line.site-base-url=https://leadlinerecord.com
lead-service-line.ops-review-enabled=false
lead-service-line.ops-review-token=
lead-service-line.admin-enabled=false
lead-service-line.admin-username=${LEAD_LINE_ADMIN_USERNAME:}
lead-service-line.admin-password=${LEAD_LINE_ADMIN_PASSWORD:}
